<!DOCTYPE html>
<html>
<head>
<title>Bill Management Login</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

/* Login Box */

.login-box{
background:white;
padding:40px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.login-box h2{
margin-bottom:25px;
color:#333;
}

/* Inputs */

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

/* Button */

button{
width:100%;
padding:12px;
background:#3a7afe;
border:none;
color:white;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2e63d6;
}

.footer{
margin-top:15px;
font-size:12px;
color:#666;
}

</style>

</head>

<body>

<div class="login-box">

<h2>💰 Bill Manager</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="footer">
Track your bills easily
</div>

</div>

<script>

function login(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

if(username=="" || password==""){
alert("Enter username and password");
return;
}

/* stored users */

let users=JSON.parse(localStorage.getItem("users"))||{};

/* new user */

if(!users[username]){

users[username]=password;

localStorage.setItem("users",JSON.stringify(users));

}

/* existing user */

else if(users[username]!==password){

alert("Wrong password");
return;

}

/* login success */

localStorage.setItem("currentUser",username);

window.location.href="dashboard.html";

}

</script>

</body>
</html>
